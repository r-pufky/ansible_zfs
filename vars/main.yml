---
###############################################################################
# ZFS Role Options
###############################################################################

zfs___release: "{{ {} | r_pufky.data.v3(

    _date='2026-03-12',
    _debian='trixie',
  ) }}"

zfs___app: "{{ {} | r_pufky.data.v3(

    _snapshot='/etc/zfs_snapshot/zfs_incremental_snapshot',
    _snapshot_unit='/etc/systemd/system/zfs_snapshot.',
  ) }}"
###############################################################################
# APT Packages
###############################################################################
# Secure boot support is automatic once the DKMS keys are loaded. See
# r_pufky.deb.secure_boot.
#
# Reference:
# * https://openzfs.github.io/openzfs-docs/Getting%20Started/Debian/index.html

zfs___packages:
  - 'zfsutils-linux'
  - 'zfs-dkms'
  - 'dpkg-dev'
  - 'linux-headers-amd64'
  - 'linux-image-amd64'

zfs___nfs_packages:
  - 'nfs-kernel-server'

###############################################################################
# Default ZFS User/Group
###############################################################################

zfs___group:
  name: 'zfs_snapshot'
  gid: 901

zfs___user:
  name: 'zfs_snapshot'
  group: 'zfs_snapshot'
  groups:
    - '_ssh'
  uid: 901
  shell: '/bin/bash'
  home: '/etc/zfs_snapshot'
  create_home: true
  password: '*'
  password_lock: true
  update_password: 'always'
  expires: -1
  system: true
