---
- name: 'Verify'
  hosts: 'all'
  gather_facts: true  # ansible_facts['mounts'].
  become: true
  tasks:
    - name: 'Verify | test | /etc/sudoers.d/zfs_snapshot'
      ansible.builtin.include_role:
        name: 'r_pufky.data.test'
        tasks_from: 'copy.yml'
      vars:
        test_name: 'Verify | test | /etc/sudoers.d/zfs_snapshot'
        test_src: 'files/zfs_snapshot.sudoers'
        test_file: '/etc/sudoers.d/zfs_snapshot'
        test_owner: 'root'
        test_group: 'root'
        test_mode: '0440'
        test_diff: true

    - name: 'Verify | test | /etc/zfs_snapshot/zfs_incremental_snapshot'
      ansible.builtin.include_role:
        name: 'r_pufky.data.test'
        tasks_from: 'copy.yml'
      vars:
        test_name: 'Verify | test | /etc/zfs_snapshot/zfs_incremental_snapshot'
        test_src: 'files/zfs_incremental_snapshot'
        test_file: '/etc/zfs_snapshot/zfs_incremental_snapshot'
        test_owner: 'zfs_snapshot'
        test_group: 'zfs_snapshot'
        test_mode: '0755'
        test_diff: true

    - name: 'Verify | cmd | query ZFS pool test imported'
      ansible.builtin.command: 'zpool list test'
      register: zfs__test_pool_test
      changed_when: false
      failed_when: false

    # noqa: command-instead-of-module query mounts, not setting them.
    - name: 'Verify | cmd | query ZFS pool test mounted'
      ansible.builtin.command: 'mount'
      register: zfs__test_pool_mount
      changed_when: false
      failed_when: false

    - name: 'Verify | assert | ZFS pool test imported'
      ansible.builtin.assert:
        quiet: true
        that: 'zfs__test_pool_test.rc == 0'
        fail_msg: |

          ✘ zpool test not imported.

          Exit code: {{ zfs__test_pool_test.rc }}

    - name: 'Verify | assert | ZFS pool test mounted'
      ansible.builtin.assert:
        quiet: true
        that: '"test on /test" in zfs__test_pool_mount.stdout'
        fail_msg: |

          ✘ zpool test should be mounted to /test.

    # noqa: command-instead-of-module timers not reported.
    - name: 'Verify | cmd | gather timer status'
      ansible.builtin.command: 'systemctl list-timers'
      register: zfs__test_scrub
      changed_when: false

    - name: 'Verify | assert | scrub service active'
      ansible.builtin.assert:
        quiet: true
        that:
          - '"zfs-scrub-monthly@test.timer" in zfs__test_scrub.stdout'
        fail_msg: |

          ✘ zfs-scrub-monthy@test.timer should be in enabled list of timers.

          {{ zfs__test_scrub.stdout }}

#################### new

    - name: 'Verify | cmd | query ZFS pool test/data atime'
      ansible.builtin.command: 'zfs get -H -o value atime test/data'
      register: zfs__test_pool_atime
      changed_when: false
      failed_when: false

    - name: 'Verify | assert | ZFS pool test/data atime'
      ansible.builtin.assert:
        quiet: true
        that:
          - zfs__test_pool_atime.stdout == 'off'
        fail_msg: |

          ✘ test/data property should be atime=off.

          atime={{ zfs__test_pool_atime.stdout }}

    # yamllint disable rule:line-length
    # Underlying system determines on/sa, both are correct on 2.3.2.
    # Reference:
    # * https://openzfs.github.io/openzfs-docs/man/master/7/zfsprops.7.html#xattr
    - name: 'Verify | cmd | query ZFS pool test/data xattr'
      ansible.builtin.command: 'zfs get -H -o value xattr test/data'
      register: zfs__test_pool_xattr
      changed_when: false
      failed_when: false

    - name: 'Verify | assert | ZFS pool test/data xattr'
      ansible.builtin.assert:
        quiet: true
        that:
          - zfs__test_pool_xattr.stdout == 'on'
        fail_msg: |

          ✘ test/data property should be xattr=sa.

          xattr={{ zfs__test_pool_xattr.stdout }}

    - name: 'Verify | cmd | query ZFS pool test/data dnodesize'
      ansible.builtin.command: 'zfs get -H -o value dnodesize test/data'
      register: zfs__test_pool_dnodesize
      changed_when: false
      failed_when: false

    - name: 'Verify | assert | ZFS pool test/data dnodesize'
      ansible.builtin.assert:
        quiet: true
        that:
          - zfs__test_pool_dnodesize.stdout == 'auto'
        fail_msg: |

          ✘ test/data property should be dnodesize=auto.

          dnodesize={{ zfs__test_pool_dnodesize.stdout }}

    - name: 'Verify | cmd | query ZFS pool test/data sharenfs'
      ansible.builtin.command: 'zfs get -H -o value sharenfs test/data'
      register: zfs__test_pool_sharenfs
      changed_when: false
      failed_when: false

    - name: 'Verify | assert | ZFS pool test/data sharenfs'
      ansible.builtin.assert:
        quiet: true
        that:
          - zfs__test_pool_sharenfs.stdout == 'rw=10.10.10.0/24,sec=sys,mountpoint'  # yamllint disable-line rule:line-length
        fail_msg: |

          ✘ test/data property incorrect.

          Expected: sharenfs=rw=10.10.10.0/24,sec=sys,mountpoint
          Received: sharenfs={{ zfs__test_pool_sharenfs.stdout }}
