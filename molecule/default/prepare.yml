---
- name: 'Prepare'
  hosts: 'all'
  gather_facts: true  # ansible_facts['kernel'].
  become: true
  tasks:
    - name: 'Prepare | ⚠ Modprobe Failure / Reboot Expected ⚠'
      ansible.builtin.debug:
        msg: |

          ⚠ Modprobe Failure / Reboot Expected ⚠

          Most VM's will require a reboot to use a Kernel with supported
          Kernel headers. A Modprobe failure followed by a reboot and
          continuing is not an error. This is expected.

    # Apply the role in default state to support ZFS operations instead of
    # basically injecting a large part of the core role.
    - name: 'Prepare | role | r_pufky.deb.zfs (create block devices)'
      ansible.builtin.include_role:
        name: 'r_pufky.deb.zfs'

    # Create testing pool for convergence testing.
    - name: 'Prepare | cmd | create file block devices'
      ansible.builtin.command: 'dd if=/dev/zero of=/tmp/fblk bs=1M count=128'
      changed_when: false

    - name: 'Prepare | cmd | setup file block loopback device'
      ansible.builtin.command: 'losetup /dev/loop0 /tmp/fblk'
      changed_when: false

    - name: 'Prepare | cmd | create zpool test'
      ansible.builtin.command: 'zpool create test /dev/loop0'
      changed_when: false

    - name: 'Prepare | cmd | create zpool dataset data'
      ansible.builtin.command: 'zfs create test/data'
      changed_when: false

    - name: 'Prepare | cmd | export zpool test'
      ansible.builtin.command: 'zpool export test'
      changed_when: false
