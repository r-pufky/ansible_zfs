---
###############################################################################
# Set ZFS pool dataset options.
###############################################################################
#
# Args:
#   container: str - ZFS pool name from zfs_srv_pools.
#   set: dict - ZFS dataset options from zfs_srv_pools.datasets.

- name: '{{ "Dataset | cmd | set property " ~ container ~ "/" ~ set.name }}'
  ansible.builtin.shell: >  # noqa name[template] use full ZFS dataset name.
      /usr/sbin/zfs set
      {{ item.option ~ '="' ~ item.value ~ '"' }}
      {{ container ~ '/' ~ set.name }}
  args:
    executable: '/bin/bash'
  register: zfs__set
  changed_when: zfs__set.rc == 0
  failed_when: zfs__set.rc > 0
  loop: '{{ set.properties }}'
